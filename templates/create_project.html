<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Project - MzansiBuilds</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <a href="/">MzansiBuilds</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/logout">Logout</a>
    </nav>

    <div class="page">
        <h1>Create a Project</h1>

        <form method="POST">
            <input type="text" name="title" placeholder="Project title" required>
            <textarea name="description" placeholder="What are you building?"></textarea>
            <input type="text" name="stage" placeholder="Stage (e.g. Idea, In Progress)">
            <input type="text" name="support_required" placeholder="Support needed (e.g. Design, Funding)">
            <button type="submit">Create</button>
        </form>

        <p><a href="/dashboard">Back to Dashboard</a></p>
    </div>
</body>
</html>
